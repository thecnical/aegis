# ─────────────────────────────────────────────────────────────────────────────
# Aegis Configuration
# Created by Chandan Pandey
# Docs: https://github.com/chandanpandey/aegis
# ─────────────────────────────────────────────────────────────────────────────

general:
  data_path: "data"
  db_path: "data/aegis.db"
  default_timeout: 30
  safe_mode: true
  http_timeout: 15
  http_retries: 3
  http_backoff: 0.3
  report_template: ""
  report_template_html: ""
  brand: "Chandan Pandey"
  workspace: "default"
  screenshot_path: "data/screenshots"
  report_custom_sections:
    - title: "Engagement Notes"
      body: "Add scope, exclusions, and testing notes here."
    - title: "Remediation Guidance"
      body: "Add remediation checklist here."
  wordlists_path: "data/wordlists"
  wordlists_repo: "https://github.com/danielmiessler/SecLists.git"

# ─── API Keys ─────────────────────────────────────────────────────────────────
# Replace CHANGE_ME with your actual keys.
api_keys:
  shodan: "CHANGE_ME"
  openrouter: "CHANGE_ME"   # https://openrouter.ai/keys  (free tier available)
  bytez: "CHANGE_ME"        # https://bytez.com           (free tier available)

# ─── Notifications ────────────────────────────────────────────────────────────
notifications:
  slack_webhook: ""         # https://api.slack.com/messaging/webhooks
  discord_webhook: ""       # Server Settings → Integrations → Webhooks

# ─── Scan Profiles ────────────────────────────────────────────────────────────
profiles:
  default:
    timeout: 30
    nmap_args: "-sC -sV"
    nuclei_rate: 150
    ferox_depth: 2
  fast:
    timeout: 10
    nmap_args: "-sS"
    nuclei_rate: 300
    ferox_depth: 1
  deep:
    timeout: 90
    nmap_args: "-sC -sV -A -O --script=vuln"
    nuclei_rate: 50
    ferox_depth: 4
  stealth:
    timeout: 120
    nmap_args: "-sS -T2 --randomize-hosts"
    nuclei_rate: 20
    ferox_depth: 2

# ─── External Tools ───────────────────────────────────────────────────────────
# Set to the command name (if on PATH) or full absolute path.
external_tools:
  # Core
  nmap: "nmap"
  netcat: "nc"
  # Recon
  subfinder: "subfinder"
  amass: "amass"
  # Vuln
  nuclei: "nuclei"
  feroxbuster: "feroxbuster"
  nikto: "nikto"
  testssl: "testssl.sh"
  ffuf: "ffuf"
  # Exploit
  sqlmap: "sqlmap"
  hydra: "hydra"
  metasploit: "msfconsole"
  # Post
  smbclient: "smbclient"
  linpeas: "linpeas.sh"
  winpeas: "winpeas.exe"
  # OSINT / Passive
  shodan: "shodan"
  # Tech detection (free alternatives — no API key required)
  # webtech: pip install webtech
  # whatweb: sudo apt install whatweb  (pre-installed on Kali)
  webtech: "webtech"
  whatweb: "whatweb"
  theHarvester: "theHarvester"
  # Screenshots
  gowitness: "gowitness"
  # Secret scanning
  trufflehog: "trufflehog"
  # OSINT / subdomain enumeration
  amass: "amass"
  # Git
  git: "git"
