name: Bug report
about: Report a bug
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: 1. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any logs or error output.